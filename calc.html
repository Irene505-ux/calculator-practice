<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background-color: rgb(183, 181, 181);;
    }
  #display {
    width: 180px;
    height: 40px;
    font-size: 20px;
    margin-bottom: 10px;
    background-color:rgb(215, 208, 208) ;
    border: none;
    border-radius: 10px;
    padding: 5px 12px;
    color: rgb(13, 13, 12);
    
  }
  .calculator {
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 20px;
    background-color:rgb(64, 64, 107) ;
    padding:20px;
    box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.15) ;
    width: 200px;
    gap: 10px;
  }
  .button-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    width: 100%;
  }
  button {
    width: 100%;
    height: 40px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: rgb(215, 208, 208);
    color: rgb(13, 13, 12);
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: rgb(196, 171, 171);
  }
  .sole {
    background-color: rgb(255, 99, 71);
    color: white;
  }
  .mad {
    background-color: rgb(248, 14, 14);
    color: white;
  }
  .brand{
    font-size: 20px;
    font-weight: bold;
    color: white;
    margin-bottom: 1px;
    text-align: center;
    opacity: 0.8;
  }

</style>
</head>
<body>
     <div class="calculator">
  <input type="text" id="display" disabled>

  <div class="brand">
    P.CALC
  </div>

  <br><br>
 <div class="button-grid">
  <button onclick="addToDisplay('1')">1</button>
  <button onclick="addToDisplay('2')">2</button>
  <button onclick="addToDisplay('3')">3</button>
  <button class="sole" onclick="addToDisplay('+')">+</button>


  <button onclick="addToDisplay('4')">4</button>
  <button onclick="addToDisplay('5')">5</button>
  <button onclick="addToDisplay('6')">6</button>
  <button class="sole" onclick="addToDisplay('-')">-</button>



  <button onclick="addToDisplay('7')">7</button>
  <button onclick="addToDisplay('8')">8</button>
  <button onclick="addToDisplay('9')">9</button>
  <button class="sole" onclick="addToDisplay('*')">*</button>


  <button class="mad" onclick="clearDisplay()">C</button>
  <button onclick="addToDisplay('0')">0</button>
  <button onclick="calculate()">=</button>
  <button class="sole" onclick="addToDisplay('/')">/</button>
   </div>
   </div>
      
        <script>
  function addToDisplay(value) {
    document.getElementById("display").value += value;
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }

  function calculate() {
    var result = eval(document.getElementById("display").value);
    document.getElementById("display").value = result;
  }
</script>
    
</body>
</html>
